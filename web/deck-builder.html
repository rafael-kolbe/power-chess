<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deck Builder — POWER CHESS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&family=Oxanium:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/card.css" />
  <link rel="stylesheet" href="/deck-builder.css" />
</head>
<body class="deck-builder-page">
  <header class="db-header">
    <a class="db-back" id="dbBackLink" href="/">← Lobby</a>
    <h1 id="dbPageTitle">Deck Builder</h1>
  </header>

  <section class="db-filters" aria-label="Filters">
    <label class="field">
      <span id="dbFilterTypeLabel">Card type</span>
      <select id="dbFilterType">
        <option value="">All</option>
        <option value="power">Power</option>
        <option value="continuous">Continuous</option>
        <option value="retribution">Retribution</option>
        <option value="counter">Counter</option>
      </select>
    </label>
    <label class="field">
      <span id="dbFilterManaLabel">Mana cost</span>
      <select id="dbFilterMana"></select>
    </label>
    <label class="field">
      <span id="dbFilterIgnLabel">Ignition</span>
      <select id="dbFilterIgn"></select>
    </label>
    <label class="field">
      <span id="dbFilterCdLabel">Cooldown</span>
      <select id="dbFilterCd"></select>
    </label>
    <label class="field field--search">
      <span id="dbFilterSearchLabel">Search name</span>
      <input type="search" id="dbFilterSearch" autocomplete="off" />
    </label>
    <button type="button" id="dbClearFiltersBtn" class="db-clear-filters-btn">Clear filters</button>
  </section>

  <section class="db-carousel-section">
    <h2 id="dbCatalogHeading">Catalog</h2>
    <div class="db-carousel-wrap">
      <div class="db-carousel" id="dbCarousel" tabindex="0"></div>
    </div>
  </section>

  <h2 id="dbYourDeckHeading" class="db-your-deck-heading">Your deck</h2>

  <section class="db-deck-panel">
    <div class="db-deck-meta">
      <div class="field field--decksel">
        <span id="dbSelDeckLabel">Selected deck</span>
        <div class="db-deck-select-row">
          <select id="dbDeckSelect" aria-labelledby="dbSelDeckLabel"></select>
          <button type="button" id="dbDeckReloadBtn" class="db-reload-deck-btn" title="">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M23 4v6h-6" />
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
              <path d="M1 20v-6h6" />
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L1 14" />
            </svg>
          </button>
          <button type="button" id="dbDeckRenameBtn" class="db-reload-deck-btn" title="">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 20h9" />
              <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" />
            </svg>
          </button>
        </div>
      </div>
      <label class="field">
        <span id="dbSkillLabel">Player skill</span>
        <select id="dbSkillSelect"></select>
      </label>
      <label class="field">
        <span id="dbSleeveLabel">Sleeve</span>
        <select id="dbSleeveSelect"></select>
      </label>
      <span class="db-deck-meta__divider" aria-hidden="true"></span>
      <div class="db-deck-meta__actions">
        <button type="button" id="dbClearDeckBtn" class="db-action-btn db-action-btn--clear">Clear deck</button>
        <button type="button" id="dbSaveBtn" class="db-action-btn db-action-btn--save">Save</button>
        <button type="button" id="dbNewDeckBtn" class="db-action-btn db-action-btn--new">Save as new deck</button>
        <span class="db-deck-meta__divider db-deck-meta__divider--actions" aria-hidden="true"></span>
        <button type="button" id="dbDeleteDeckBtn" class="db-action-btn db-action-btn--danger">Delete deck</button>
      </div>
    </div>
    <p class="db-deck-count" id="dbDeckCount">0 / 20</p>
    <div class="db-deck-grid-wrap">
      <div class="db-deck-grid" id="dbDeckGrid"></div>
    </div>
  </section>

  <div id="dbAlertModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-dialog db-mini-modal" role="alertdialog" aria-modal="true" aria-labelledby="dbAlertModalTitle" aria-describedby="dbAlertModalMessage">
      <h3 id="dbAlertModalTitle" class="db-mini-modal__title"></h3>
      <p id="dbAlertModalMessage" class="db-mini-modal__body"></p>
      <div class="modal-actions db-mini-modal__actions">
        <button type="button" id="dbAlertModalOk" class="match-end-btn-primary"></button>
      </div>
    </div>
  </div>

  <div id="dbConfirmModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-dialog db-mini-modal db-mini-modal--confirm" role="dialog" aria-modal="true" aria-labelledby="dbConfirmModalTitle" aria-describedby="dbConfirmModalMessage">
      <h3 id="dbConfirmModalTitle" class="db-mini-modal__title"></h3>
      <p id="dbConfirmModalMessage" class="db-mini-modal__body"></p>
      <div class="modal-actions db-mini-modal__actions">
        <button type="button" id="dbConfirmModalCancel" class="match-end-btn-secondary"></button>
        <button type="button" id="dbConfirmModalConfirm" class="db-action-btn db-action-btn--danger"></button>
      </div>
    </div>
  </div>

  <div id="dbRenameDeckModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-dialog db-new-deck-dialog" role="dialog" aria-modal="true" aria-labelledby="dbRenameDeckTitle">
      <h3 id="dbRenameDeckTitle">Rename deck</h3>
      <label class="field db-new-deck-dialog__field">
        <span id="dbRenameDeckNameLabel">Deck name</span>
        <input type="text" id="dbRenameDeckNameInput" autocomplete="off" />
      </label>
      <div class="modal-actions db-new-deck-dialog__actions">
        <button type="button" id="dbRenameDeckCancel" class="match-end-btn-secondary">Cancel</button>
        <button type="button" id="dbRenameDeckSave" class="match-end-btn-primary">Save</button>
      </div>
    </div>
  </div>

  <div id="dbNewDeckModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-dialog db-new-deck-dialog" role="dialog" aria-modal="true" aria-labelledby="dbNewDeckTitle">
      <h3 id="dbNewDeckTitle">New deck</h3>
      <label class="field db-new-deck-dialog__field">
        <span id="dbNewDeckNameLabel">Deck name</span>
        <input type="text" id="dbNewDeckNameInput" autocomplete="off" />
      </label>
      <div class="modal-actions db-new-deck-dialog__actions">
        <button type="button" id="dbNewDeckCancel" class="match-end-btn-secondary">Cancel</button>
        <button type="button" id="dbNewDeckConfirm" class="match-end-btn-primary">Confirm</button>
      </div>
    </div>
  </div>

  <div id="dbDeckHoverPreview" class="db-deck-hover-preview hidden" aria-hidden="true"></div>

  <script src="/card-metadata.gen.js"></script>
  <script src="/cards-catalog.js"></script>
  <script src="/card.js"></script>
  <script src="/deck-builder.js"></script>
</body>
</html>
