services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: power-chess-server
    env_file:
      - .env
    environment:
      POWER_CHESS_SESSION_LOG_DIR: /var/log/power-chess
      POWER_CHESS_SESSION_LOG_KEEP: ${POWER_CHESS_SESSION_LOG_KEEP:-5}
    ports:
      - "8080:8080"
    volumes:
      - ./logs/docker/server:/var/log/power-chess
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: power-chess-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: powerchess
      POWER_CHESS_SESSION_LOG_DIR: /var/log/power-chess
      POWER_CHESS_SESSION_LOG_KEEP: ${POWER_CHESS_SESSION_LOG_KEEP:-5}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d powerchess"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./logs/docker/postgres:/var/log/power-chess
      - ./scripts/session-log-wrap.sh:/session-log-wrap.sh:ro
    entrypoint: ["/bin/sh", "/session-log-wrap.sh"]
    command:
      - /usr/local/bin/docker-entrypoint.sh
      - postgres

volumes:
  pgdata:

