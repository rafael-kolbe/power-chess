services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: power-chess-server
    environment:
      SERVER_ADDR: ":8080"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/powerchess?sslmode=disable"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: power-chess-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: powerchess
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d powerchess"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

